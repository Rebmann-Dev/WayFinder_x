name: wayfinder
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip

  # Core ML
  - pytorch::pytorch=2.2.2
  - pytorch::torchvision
  - pytorch::cpuonly

  # Data
  - numpy
  - pandas
  - scikit-learn
  - joblib

  # Transformers / HuggingFace
  - conda-forge::transformers
  - conda-forge::tokenizers
  - conda-forge::huggingface_hub
  - conda-forge::datasets
  - conda-forge::safetensors

  # App
  - streamlit
  - altair

  # HTTP / async
  - requests
  - httpx
  - aiohttp

  # Geo / maps
  - conda-forge::folium

  # Jupyter (for training notebooks)
  - jupyter
  - jupyterlab
  - ipykernel
  - ipywidgets

  # Utilities
  - pyyaml
  - python-dotenv
  - tqdm
  - pillow
  - gitpython
  - beautifulsoup4
  - regex

  # pip-only packages
  - pip:
    - open-meteo
    - overpy
    - streamlit-folium
