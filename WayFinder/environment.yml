name: wayfinder
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip

  # Data / ML
  - numpy
  - pandas
  - scikit-learn>=1.4
  - joblib

  # App
  - streamlit
  - altair

  # HTTP / async
  - requests
  - httpx
  - aiohttp

  # Geo / maps
  - conda-forge::folium

  # Jupyter (for training notebooks)
  - jupyter
  - jupyterlab
  - ipykernel
  - ipywidgets

  # Utilities
  - pyyaml
  - python-dotenv
  - tqdm
  - pillow
  - gitpython
  - beautifulsoup4
  - regex
  - dateparser

  # pip-only packages (PyTorch via pip for cross-platform compatibility)
  - pip:
    - torch>=2.0
    - torchvision
    - open-meteo
    - overpy
    - streamlit-folium
